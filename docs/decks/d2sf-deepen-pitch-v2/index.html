<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepen — D2SF Pitch (v2)</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0a0a0a;
            font-family: system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .viewer { width: 100vw; height: 100vh; position: relative; overflow: hidden; user-select: none; }
        .slide-container {
            width: 1920px; height: 1080px;
            transform-origin: 0 0;
            position: absolute; top: 50%; left: 50%;
            overflow: hidden; border-radius: 4px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.6);
        }
        .slide-container > .slide {
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .slide-container > .slide.active { opacity: 1; pointer-events: auto; }

        .loading-msg {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.4); font-size: 15px; letter-spacing: 0.1em; z-index: 9999;
        }
        .loading-msg.hidden { display: none; }

        .progress {
            position: fixed; top: 0; left: 0; height: 3px;
            background: #D97706;
            transition: width 0.3s ease; z-index: 1001;
        }

        .controls {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 8px 20px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
        }
        .viewer:hover .controls, .controls:focus-within { opacity: 1; }
        .controls button {
            background: none; border: none; color: rgba(255,255,255,0.7);
            cursor: pointer; padding: 6px 10px; border-radius: 6px;
            transition: all 0.2s ease; display: flex; align-items: center;
        }
        .controls button:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .counter { color: rgba(255,255,255,0.5); font-size: 13px; font-variant-numeric: tabular-nums; min-width: 50px; text-align: center; }
        .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }

        .hints {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); font-size: 12px; text-align: center;
            z-index: 999; opacity: 1; transition: opacity 1s ease;
        }
        .hints.hidden { opacity: 0; pointer-events: none; }
        .hints kbd { display: inline-block; padding: 2px 6px; border: 1px solid rgba(255,255,255,0.2); border-radius: 3px; font-size: 11px; margin: 0 2px; }

        .grid-overlay {
            position: fixed; inset: 0; background: rgba(5, 5, 10, 0.95);
            z-index: 2000; display: none; overflow-y: auto; padding: 40px;
        }
        .grid-overlay.active { display: block; }
        .grid-overlay .grid-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .grid-overlay .grid-title { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 0.08em; }
        .grid-overlay .grid-close {
            background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5);
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .grid-overlay .grid-close:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
        .grid-wrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .grid-thumb {
            position: relative; aspect-ratio: 16 / 9; border-radius: 6px;
            overflow: hidden; cursor: pointer; border: 2px solid transparent;
            transition: all 0.2s ease; background: #111;
        }
        .grid-thumb:hover { border-color: #D97706; transform: translateY(-2px); }
        .grid-thumb.current { border-color: #D97706; }
        .grid-thumb-inner { width: 1920px; height: 1080px; transform-origin: 0 0; pointer-events: none; position: absolute; top: 0; left: 0; }
        .grid-thumb-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 20px 12px 8px; color: rgba(255,255,255,0.6); font-size: 12px;
        }

        @media print {
            @page { size: 1920px 1080px; margin: 0; }
            html, body { width: 1920px; height: auto; overflow: visible; background: none !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
            .viewer { width: 1920px; height: auto; overflow: visible; }
            .slide-container { position: static !important; transform: none !important; width: 1920px; height: auto; box-shadow: none; border-radius: 0; overflow: visible; }
            .slide-container > .slide {
                position: relative !important; opacity: 1 !important; pointer-events: auto;
                width: 1920px; height: 1080px;
                page-break-after: always; break-after: page;
                page-break-inside: avoid; break-inside: avoid; overflow: hidden;
            }
            .slide-container > .slide:last-child { page-break-after: auto; break-after: auto; }
            .controls, .progress, .hints, .loading-msg, .grid-overlay { display: none !important; }
            *, *::before, *::after { -webkit-backdrop-filter: none !important; backdrop-filter: none !important; }
        }
    </style>
</head>
<body>
    <div class="loading-msg" id="loadingMsg">LOADING SLIDES...</div>

    <div class="grid-overlay" id="gridOverlay">
        <div class="grid-header">
            <span class="grid-title">SLIDE OVERVIEW</span>
            <button class="grid-close" onclick="toggleGrid()">Close</button>
        </div>
        <div class="grid-wrap" id="gridWrap"></div>
    </div>

    <div class="viewer">
        <div class="progress" id="progress"></div>
        <div class="slide-container" id="slideContainer"></div>

        <div class="controls">
            <button onclick="prevSlide()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
            <span class="counter"><span id="current">1</span> / <span id="total">15</span></span>
            <button onclick="nextSlide()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
            <span class="divider"></span>
            <button onclick="toggleFullscreen()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg></button>
            <button onclick="exportPDF()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></button>
            <span class="divider"></span>
            <button onclick="toggleGrid()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
        </div>

        <div class="hints" id="hints">
            <kbd>←</kbd> <kbd>→</kbd> navigate · <kbd>F</kbd> fullscreen · <kbd>P</kbd> PDF · <kbd>G</kbd> overview
        </div>
    </div>

    <script>
        const SLIDE_FILES = [
            'slide-1.html', 'slide-2.html', 'slide-3.html', 'slide-4.html',
            'slide-5.html', 'slide-6.html', 'slide-7.html', 'slide-8.html',
            'slide-9.html', 'slide-10.html', 'slide-11.html',
            'slide-13.html', 'slide-14.html', 'slide-15.html', 'slide-16.html'
        ];

        const container = document.getElementById('slideContainer');
        let slides = [], current = 0, total = SLIDE_FILES.length;
        document.getElementById('total').textContent = total;

        async function loadSlides() {
            const results = await Promise.all(SLIDE_FILES.map(f => fetch(f).then(r => r.text())));
            results.forEach((html) => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const sourceSlide = doc.querySelector('.slide');
                if (sourceSlide) {
                    const styleEls = doc.querySelectorAll('head style');
                    styleEls.forEach((styleEl) => {
                        if (styleEl.textContent.includes('transform-origin: 0 0')) return;
                        const injected = document.createElement('style');
                        injected.textContent = styleEl.textContent;
                        document.head.appendChild(injected);
                    });
                    const section = document.createElement('div');
                    section.className = 'slide';
                    section.innerHTML = sourceSlide.innerHTML;
                    sourceSlide.classList.forEach(cls => { if (cls !== 'slide') section.classList.add(cls); });
                    container.appendChild(section);
                }
            });
            slides = container.querySelectorAll('.slide');
            total = slides.length;
            document.getElementById('total').textContent = total;
            if (slides.length > 0) {
                slides[0].classList.add('active');
                document.getElementById('progress').style.width = (1 / total * 100) + '%';
            }
            document.getElementById('loadingMsg').classList.add('hidden');
        }
        loadSlides();

        function showSlide(n) {
            if (slides.length === 0) return;
            slides[current].classList.remove('active');
            current = ((n % total) + total) % total;
            slides[current].classList.add('active');
            document.getElementById('current').textContent = current + 1;
            document.getElementById('progress').style.width = ((current + 1) / total * 100) + '%';
        }
        function nextSlide() { showSlide(current + 1); }
        function prevSlide() { showSlide(current - 1); }
        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
        function exportPDF() {
            fetch('deck-export.pdf', { method: 'HEAD' }).then(r => {
                if (r.ok) { const a = document.createElement('a'); a.href = 'deck-export.pdf'; a.download = 'deck-export.pdf'; a.click(); }
                else window.print();
            }).catch(() => window.print());
        }
        function toggleGrid() {
            const overlay = document.getElementById('gridOverlay');
            const isActive = overlay.classList.toggle('active');
            if (isActive) buildGrid();
        }
        function buildGrid() {
            const wrap = document.getElementById('gridWrap');
            wrap.innerHTML = '';
            slides.forEach((slide, idx) => {
                const thumb = document.createElement('div');
                thumb.className = 'grid-thumb' + (idx === current ? ' current' : '');
                thumb.onclick = () => { showSlide(idx); toggleGrid(); };
                const inner = document.createElement('div');
                inner.className = 'grid-thumb-inner';
                inner.innerHTML = slide.innerHTML;
                slide.classList.forEach(cls => { if (cls !== 'slide' && cls !== 'active') inner.classList.add(cls); });
                thumb.appendChild(inner);
                const label = document.createElement('div');
                label.className = 'grid-thumb-label';
                label.textContent = 'Slide ' + (idx + 1);
                thumb.appendChild(label);
                wrap.appendChild(thumb);
                requestAnimationFrame(() => {
                    const rect = thumb.getBoundingClientRect();
                    inner.style.transform = `scale(${rect.width / 1920})`;
                });
            });
        }
        document.addEventListener('keydown', (e) => {
            const gridOpen = document.getElementById('gridOverlay').classList.contains('active');
            if (gridOpen) {
                if (e.key === 'Escape' || e.key === 'g' || e.key === 'G') { e.preventDefault(); toggleGrid(); }
                return;
            }
            switch(e.key) {
                case 'ArrowRight': case ' ': e.preventDefault(); nextSlide(); break;
                case 'ArrowLeft': e.preventDefault(); prevSlide(); break;
                case 'Home': e.preventDefault(); showSlide(0); break;
                case 'End': e.preventDefault(); showSlide(total - 1); break;
                case 'f': case 'F': if (!e.metaKey && !e.ctrlKey) toggleFullscreen(); break;
                case 'p': case 'P': if (!e.metaKey && !e.ctrlKey) { e.preventDefault(); exportPDF(); } break;
                case 'g': case 'G': if (!e.metaKey && !e.ctrlKey) { e.preventDefault(); toggleGrid(); } break;
                case 'Escape': if (document.fullscreenElement) document.exitFullscreen(); break;
            }
        });
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 50) { dx > 0 ? prevSlide() : nextSlide(); }
        });
        function scaleSlides() {
            const vw = window.innerWidth, vh = window.innerHeight;
            const scale = Math.min(vw / 1920, vh / 1080) * 0.92;
            const sw = 1920 * scale, sh = 1080 * scale;
            container.style.transform = `translate(${-sw / 2}px, ${-sh / 2}px) scale(${scale})`;
        }
        window.addEventListener('resize', scaleSlides);
        scaleSlides();
        setTimeout(() => { document.getElementById('hints').classList.add('hidden'); }, 4000);
    </script>
</body>
</html>
