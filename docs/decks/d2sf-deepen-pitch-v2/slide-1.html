<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Cover — Deepen D2SF</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; background: #0a0a0a; overflow: hidden; position: relative; }
        .slide { width: 1920px; height: 1080px; transform-origin: 0 0; position: absolute; top: 50%; left: 50%; overflow: hidden; border-radius: 4px; box-shadow: 0 20px 80px rgba(0,0,0,0.6); }
    </style>
    <link rel="stylesheet" href="styles.css">
    <script>
        function scaleSlide() {
            const slide = document.querySelector('.slide');
            const vw = window.innerWidth, vh = window.innerHeight;
            const scale = Math.min(vw / 1920, vh / 1080) * 0.92;
            const sw = 1920 * scale, sh = 1080 * scale;
            slide.style.transform = `translate(${-sw / 2}px, ${-sh / 2}px) scale(${scale})`;
        }
        window.addEventListener('resize', scaleSlide);
        window.addEventListener('load', scaleSlide);
    </script>
</head>
<body>
    <div class="slide cover">
        <div style="display:flex; flex-direction:column; max-width:1100px; padding-top:40px;">
            <div style="font-family:'Outfit',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.22em; color:var(--accent); text-transform:uppercase; margin-bottom:36px;">
                AI Learning Coach · for Korean College Entrance Exams
            </div>
            <div class="cover-mark">Deepen<span class="dot">.</span></div>
            <div class="cover-tag">
                유형 단위로 <span class="em">약점을 추적</span>하고,<br>
                이전 학년의 <span class="em">숨은 결손까지 역추적</span>하는<br>
                입시 AI 학습 코치
            </div>
        </div>

        <div class="cover-graph">
            <div class="cnode c">Concept · 미분의 활용</div>
            <div class="cline"></div>
            <div class="cnode p">Pattern · 곡선 밖 접선</div>
            <div class="cline"></div>
            <div class="cnode i">Item · 2025 수능 N번</div>
        </div>

        <div class="cover-meta-v1">
            <div class="cover-meta-item">
                <span class="label">제출처</span>
                <span class="value">Naver D2SF</span>
            </div>
            <div class="cover-meta-item">
                <span class="label">팀</span>
                <span class="value">Deepen — 연세대 산공 5인</span>
            </div>
            <div class="cover-meta-item">
                <span class="label">대표</span>
                <span class="value">박정현 · pjhice0331@gmail.com</span>
            </div>
            <div class="cover-meta-item">
                <span class="label">Date</span>
                <span class="value">2026</span>
            </div>
        </div>
    </div>
    <!-- notes: v1 표지. 워드마크 + 시그니처 그래프 + 메타. -->
</body>
</html>
